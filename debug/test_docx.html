<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/docx-preview/dist/docx-preview.min.js"></script>
    <style>
        #container { width: 100%; height: 100vh; overflow: auto; }
    </style>
</head>
<body>
    <div id="container" contenteditable="true"></div>
    <script>
        fetch('Ecolab - Bang de xuat hop tac.docx')
            .then(res => res.blob())
            .then(blob => {
                docx.renderAsync(blob, document.getElementById("container"), null, {
                    className: "docx", 
                    inWrapper: true, 
                    ignoreWidth: false, 
                    ignoreHeight: false, 
                    ignoreFonts: false, 
                    breakPages: true, 
                    ignoreLastRenderedPageBreak: true, 
                    experimental: true, 
                    trimXmlDeclaration: true, 
                    debug: false
                });
            });
    </script>
</body>
</html>
