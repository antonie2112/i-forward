<script src="js/jquery-3.2.1.min.js"></script>

<script type="text/javascript" language="javascript">

    var q = ""
    var s = ""
    var lang = ""
    var btn_counter = 0
    var selected_counter = 0
    var selected_products = []
    var selected_products_detailed = []


    $(document).ready(function (e) {
        $(".selected-product-area").hide()

        // $(".table-option").hide()

        function get_form_value() {
            q = $(".query").val()
            s = $(".product-segment option:selected").val()
            lang = ""
            $.each($(".btn-lang"), function (key, value) {
                if ($(this).hasClass("btn-secondary")) {
                    lang += value.id + "|"
                }

            })
            $("#language_list").val(lang)
        }


        // =================
        // Search function
        // =================
        $('.query').keypress(function (e) {

            var key = e.which;
            if (key == 13)  // the enter key code
            {
                $(".btn-search").trigger("click");
                return false;
            }
        });

        $(".btn-lang").on("click", function (e) {
            if ($(this).hasClass("btn-outline-secondary")) {
                btn_counter++
                if (btn_counter <= 2)
                    $(this).removeClass("btn-outline-secondary").addClass("btn-secondary")
                else {
                    $(".btn-lang").removeClass("btn-secondary").addClass("btn-outline-secondary")
                    $(this).removeClass("btn-outline-secondary").addClass("btn-secondary")
                    btn_counter = 1
                }
            } else {
                $(this).removeClass("btn-secondary").addClass("btn-outline-secondary")
                btn_counter--
            }
            $(".btn-search").trigger("click");


        })

        $(".btn-hide-dilution").on("click", function (e) {
            if ($(this).hasClass("btn-outline-secondary")) {
                $(this).removeClass("btn-outline-secondary").addClass("btn-secondary")
                $("#dilution_mode").val("hide")
            } else {
                $(this).removeClass("btn-secondary").addClass("btn-outline-secondary")
                $("#dilution_mode").val("show")
            }


        })

        $(".product-segment").on("change", function (e) {
            $(".btn-search").trigger("click");
        })


        $(".btn-clear").on("click", function (e) {
            location.reload()
        })

        $('form').on("submit", function (e) {
            if (selected_products.length != 0) {
                return true
            } else {
                alert("You must select at least one product to proceed")
                return false
            }
        });

        $(".btn-search").click(function (e) {
            // get query from input
            get_form_value()
            // reset all
            $(".result-area, .pagination-area").empty()
            if (lang != "") {
                $.post("show_result_pagination.php",
                    {
                        q: q,
                        s: s,
                        lang: lang,
                        table: '2',
                    }, function (data) {
                        get_result(q, 1)
                        $(".pagination-area").empty().append(data).fadeIn("fast")
                        $(".pageSelect").on("click", function () {
                            page = $(this).attr("p")

                            $(".page-item").removeClass("active")
                            $(".page-item-" + page).addClass("active")
                            get_result(q, page)
                            // make the highlight

                        });
                        $('html, body').animate({
                            scrollTop: $(".result-area").offset().top - 300
                        }, 500)

                    })
            } else {
                alert("Please select at least one language to proceed")
            }

        });

        function update_stat(c, p) {
            $.post("api_update_stat_product.php", {
                table: c,
                pid: p
            }, function (data) {

            })
        }

        function get_result(q, page) {
            $("#preloader-area").empty().append('<img src="img/progress.gif" width=24 height=24>').show();

            $.post("show_result.php",
                {
                    q: q,
                    s: s,
                    lang: lang,
                    table: '2',
                    page: page

                }, function (data) {

                    function update_product(plist) {
                        $(".selected-product-area").empty()
                        if (selected_products.length != 0) {
                            counter = 1
                            len = plist.length
                            $.each(plist, function (index, value) {
                                product_id = value[0]
                                product_name = value[1]
                                product_img = value[2]

                                option_string = ""

                                for (i = 0; i < len; i++) {
                                    if (index == i)
                                        option_string += "<option value=" + i + " selected>" + (i + 1) + "</option>"
                                    else
                                        option_string += "<option value=" + i + ">" + (i + 1) + "</option>"
                                }


                                $(".selected-product-" + counter).empty().append("<table class='table table-selected table-sm table-bordered'><tbody><tr><td style='vertical-align:middle;border:0;'><a href='#' class='remove-product' data-toggle='tooltip' data-placement='bottom' title='Remove this product' pid=" + product_id + "><i class='fa fa-close fa-2x' aria-hidden='true' style='color:red'></i></a></td><td style='vertical-align:middle;border:0'><select class='form-control product-seq' pos=" + (counter - 1) + ">" + option_string + "</select></td></tr><tr><td width=20% height='100' style='vertical-align:middle;border:0'><img src=" + product_img + " style='max-width:64px;max-height:64px'></td><td width=80% height='100' style='vertical-align:middle;border:0'><small>" + product_name + "</small></td></tr></tbody></table>")
                                counter++
                            })
                        }

                        $(".remove-product").on("click", function (e) {
                            e.preventDefault()
                            pid = parseInt($(this).attr("pid"))
                            // console.log("========================")
                            // console.log(selected_products)
                            // console.log(selected_products_detailed)
                            pos = jQuery.inArray(pid, selected_products)
                            // console.log("We found [" + pid + "] at position = " + pos)
                            selected_products.splice(pos, 1);
                            selected_products_detailed.splice(pos, 1);
                            $("#product_id_list").val(selected_products)
                            // console.log(selected_products)
                            // console.log(selected_products_detailed)
                            // console.log("========================")
                            $('[data-toggle="tooltip"]').tooltip('hide')
                            $(".product-box[pid=" + pid + "]").css("background-color", "")
                            selected_counter--
                            update_product(selected_products_detailed)

                        })

                        $(".product-seq").on("change", function (e) {
                            var current_seq = $(this).attr("pos")
                            var current_selected_products_val = selected_products[current_seq]
                            var current_selected_products_detail_val = selected_products_detailed[current_seq]
                            var selected_seq = $(this).val()

                            // console.log(current_selected_products_val)
                            selected_products.splice(current_seq, 1)
                            selected_products.splice(selected_seq, 0, current_selected_products_val)
                            $("#product_id_list").val(selected_products)

                            selected_products_detailed.splice(current_seq, 1)
                            selected_products_detailed.splice(selected_seq, 0, current_selected_products_detail_val)

                            update_product(selected_products_detailed)
                        })


                        $(function () {
                            $('[data-toggle="tooltip"]').tooltip({trigger: "hover"})
                        })

                    }

                    $("#preloader-area").hide()
                    $(".result-area").empty().append(data).fadeIn("fast")

                    $(".select-product").on("click", function (e) {
                        var pid = parseInt($(this).attr("pid"))
                        if (!selected_products.includes(pid)) {
                            selected_counter++
                            var table = '2'
                            if (selected_counter < 7) {

                                var pname = $(this).attr("pname").replace(/_/g, "<br>")
                                var pimg = $(this).find('.product-image').attr("src")
                                var each_product = []
                                each_product.push(pid, pname, pimg)
                                selected_products.push(pid)
                                selected_products_detailed.push(each_product)

                                // set background
                                $("#product_id_list").val(selected_products)
                                $(this).css("background-color", "#CCCCCC")
                                $(".table-option").show()
                                update_product(selected_products_detailed)

                                $(".selected-product-area").fadeIn(200)
                                update_stat(table, pid)
                            } else {
                                alert("Please remove one or more items before adding the new one")
                                selected_counter--
                            }
                        } else {
                            alert("You have already added this item")
                        }
                        // console.log(selected_products)
                    })

                    $(".product-box").on("mouseover", function (e) {
                        current_bg = $(this).css("background-color")
                        // console.log(current_bg)
                        if (current_bg == "rgba(0, 0, 0, 0)") {
                            $(this).css("background-color", "#E5E5E5")
                        }
                    })
                    $(".product-box").on("mouseout", function (e) {
                        current_bg = $(this).css("background-color")
                        if (current_bg == "rgb(229, 229, 229)") {
                            $(this).css("background-color", "")
                        }
                    })

                    $(function () {
                        $('[data-toggle="tooltip"]').tooltip({trigger: "hover"})
                    })


                })
        }


    });

</script>
